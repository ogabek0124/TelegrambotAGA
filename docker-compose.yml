version: '3.8'

services:
  # PostgreSQL Database (Neon local alternative)
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: inglizchaoson
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Django Backend
  backend:
    build: .
    command: sh -c "cd backend && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inglizchaoson
      DEBUG: "True"
      DJANGO_SECRET_KEY: dev-secret-key
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

  # Telegram Bot
  bot:
    build: .
    command: python bot/bot.py
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/inglizchaoson
      DEBUG: "True"
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  postgres_data:
